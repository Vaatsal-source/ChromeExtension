<!DOCTYPE html>
<html>
<head>
  <title>Smart File Compressor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      padding: 15px;
      background: #f4f6f8;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #333;
    }

    input[type="file"] {
      width: 100%;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    #compressBtn {
      background: #4CAF50;
      color: white;
    }

    #compressBtn:hover {
      background: #45a049;
    }

    #decompressBtn {
      background: #2196F3;
      color: white;
    }

    #decompressBtn:hover {
      background: #1976d2;
    }

    #output {
      margin-top: 12px;
      padding: 10px;
      background: white;
      border-radius: 6px;
      font-size: 12px;
      white-space: pre-line;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      min-height: 60px;
    }

    .note {
      margin-top: 8px;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
  </style>
</head>

<body>

  <h2>File Compressor</h2>

  <input type="file" id="fileInput">

  <button id="compressBtn">Compress</button>
  <button id="decompressBtn">Decompress (.gz only)</button>

  <div id="output">Outputs</div>

  <div class="note">
    Supports: TXT, Images, WAV, MP4
  </div>

  <script src="pako.min.js"></script>
  <script src="lame.min.js"></script>
  <script src="popup.js"></script>

</body>
</html>
